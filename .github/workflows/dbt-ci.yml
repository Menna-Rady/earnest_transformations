name: dbt CI

on:
  pull_request:
    branches: [main]
    paths:
      - "models/**"
      - "macros/**"
      - "seeds/**"
      - "snapshots/**"
      - "analyses/**"
      - "tests/**"
      - "airflow/**"
      - "orchestration/**"
      - "python_tests/**"
      - "spark/**"
      - "dashboard/**"
      - "docker-compose.yml"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "dbt_project.yml"
  push:
    branches: [main]

jobs:
  python-and-dag-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lightweight test dependencies
        run: pip install -r requirements-dev.txt -r dashboard/requirements.txt
      - name: Compile Python entry points
        run: python -m compileall -q orchestration airflow/dags spark
      - name: Lint maintained Python code
        run: ruff check orchestration airflow/dags python_tests spark dashboard
      - name: Run unit and contract tests
        run: pytest -q python_tests
      - name: Validate Docker Compose
        run: cp .env.example .env && docker compose config --quiet

  spark-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Spark test dependencies
        run: pip install pytest pyspark==4.0.0 python-dotenv requests groq
      - name: Test deterministic Spark transformations
        env:
          PYTHONPATH: spark
        run: pytest -q spark/tests

  dbt-build-and-test:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ./
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
      SNOWFLAKE_SOURCE_DATABASE: ${{ secrets.SNOWFLAKE_SOURCE_DATABASE }}
      SNOWFLAKE_SOURCE_SCHEMA: ${{ secrets.SNOWFLAKE_SOURCE_SCHEMA }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          pip install dbt-core dbt-snowflake

      - name: Install dbt packages
        run: dbt deps

      - name: Validate project (dbt parse)
        run: dbt parse

      - name: Run dbt build (models + tests)
        if: env.SNOWFLAKE_ACCOUNT != ''
        run: dbt build

      - name: Run dbt tests (explicit)
        if: env.SNOWFLAKE_ACCOUNT != ''
        run: dbt test
